<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go4AI — Intelligence documentaire</title>
    <meta name="description" content="Plateforme RAG souveraine — indexez, interrogez et analysez vos données avec Go4AI." />

    <meta property="og:title" content="Go4AI — Intelligence documentaire" />
    <meta property="og:description" content="Exploitez l'intelligence de vos documents avec un assistant IA souverain." />
    <meta property="og:type" content="website" />
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('go4ai-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (!stored && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
